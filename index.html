<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>~*~ VoIcE TrAnScRiBeR ~*~</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Comic Sans MS', 'Comic Neue', 'Chalkboard SE', cursive;
      background: #000080;
      background-image:
        radial-gradient(circle at 20% 20%, #ff00ff33 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, #00ffff33 0%, transparent 50%),
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 10px,
          rgba(255,255,0,0.03) 10px,
          rgba(255,255,0,0.03) 20px
        );
      color: #ffff00;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      margin-bottom: 8px;
      text-align: center;
      background: linear-gradient(90deg, #ff0000, #ff7700, #ffff00, #00ff00, #0000ff, #8b00ff, #ff0000);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: rainbow 2s linear infinite;
      filter: drop-shadow(2px 2px 0px #000) drop-shadow(0 0 10px #ff00ff);
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    @keyframes rainbow {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    .subtitle {
      color: #00ffff;
      margin-bottom: 32px;
      font-size: 1rem;
      text-align: center;
      text-shadow: 0 0 8px #00ffff, 2px 2px 0 #000;
      animation: blink 1.5s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .card {
      background: linear-gradient(135deg, #1a0033, #000066, #001a33);
      border-radius: 0;
      padding: 28px;
      margin-bottom: 20px;
      border: 3px solid;
      border-image: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #ff00ff) 1;
      box-shadow:
        0 0 15px #ff00ff,
        0 0 30px #0000ff,
        inset 0 0 20px rgba(255,0,255,0.05);
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #ff00ff, #ffff00, #00ffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 4px #ff00ff);
    }

    /* Recording controls */
    .recording-controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border: 3px outset;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Comic Sans MS', 'Comic Neue', cursive;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.1s;
      text-shadow: 1px 1px 0 #000;
    }

    .btn:hover:not(:disabled) {
      transform: scale(1.05) rotate(-1deg);
      filter: brightness(1.2);
    }

    .btn:active:not(:disabled) {
      border-style: inset;
      transform: scale(0.97);
    }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      filter: grayscale(0.5);
    }

    .btn-primary {
      background: linear-gradient(135deg, #0000cc, #6600ff);
      color: #ffff00;
      border-color: #9900ff;
      box-shadow: 0 0 8px #6600ff;
    }

    .btn-danger {
      background: linear-gradient(135deg, #cc0000, #ff6600);
      color: #ffff00;
      border-color: #ff0000;
      box-shadow: 0 0 8px #ff0000;
    }

    .btn-warning {
      background: linear-gradient(135deg, #cc6600, #ffcc00);
      color: #000;
      border-color: #ffaa00;
      box-shadow: 0 0 8px #ffcc00;
    }

    .btn-secondary {
      background: linear-gradient(135deg, #333366, #555599);
      color: #ffffff;
      border-color: #9999cc;
    }

    .btn-success {
      background: linear-gradient(135deg, #006600, #00cc00);
      color: #ffff00;
      border-color: #00ff00;
      box-shadow: 0 0 8px #00ff00;
    }

    /* Status indicator */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      font-size: 0.9rem;
      font-weight: 700;
      font-family: 'Comic Sans MS', 'Comic Neue', cursive;
      border: 2px solid;
      text-transform: uppercase;
    }

    .status-badge.idle { background: #111133; color: #aaaacc; border-color: #444466; }
    .status-badge.recording { background: #330000; color: #ff4444; border-color: #ff0000; box-shadow: 0 0 10px #ff0000; }
    .status-badge.paused { background: #332200; color: #ffcc00; border-color: #ffaa00; box-shadow: 0 0 10px #ffcc00; }
    .status-badge.done { background: #003300; color: #00ff88; border-color: #00ff00; box-shadow: 0 0 10px #00ff00; }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 6px currentColor;
    }

    .dot.pulse {
      animation: pulse 0.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 6px currentColor; }
      50% { opacity: 0.4; transform: scale(0.7); box-shadow: 0 0 2px currentColor; }
    }

    .timer {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      margin: 20px 0 0;
      background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #ff00ff);
      background-size: 300% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: rainbow 1.5s linear infinite;
      filter: drop-shadow(0 0 6px #ff00ff);
    }

    /* Transcript */
    textarea {
      width: 100%;
      min-height: 150px;
      border: 3px inset #9900ff;
      background: #000022;
      padding: 14px;
      font-size: 1rem;
      line-height: 1.6;
      resize: vertical;
      color: #00ff99;
      font-family: 'Comic Sans MS', 'Comic Neue', cursive;
      box-shadow: inset 0 0 15px rgba(0,255,150,0.1), 0 0 10px #9900ff;
    }

    textarea:focus {
      outline: none;
      border-color: #ff00ff;
      box-shadow: inset 0 0 15px rgba(255,0,255,0.1), 0 0 15px #ff00ff;
    }

    textarea::placeholder { color: #336644; }

    .textarea-hint {
      font-size: 0.85rem;
      color: #ff99ff;
      margin-top: 8px;
      text-shadow: 0 0 4px #ff00ff;
    }

    /* Structured output */
    .structured-output {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .field-row {
      display: flex;
      gap: 12px;
    }

    .field-label {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #ff99ff;
      min-width: 160px;
      padding-top: 2px;
      text-shadow: 0 0 6px #ff00ff;
    }

    .field-value {
      font-size: 0.95rem;
      color: #ffff99;
      flex: 1;
      text-shadow: 0 0 4px #ffff00;
    }

    .field-value.null-value {
      color: #555577;
      font-style: italic;
    }

    .tasks-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .tasks-list li {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      font-size: 0.95rem;
      color: #ffff99;
      text-shadow: 0 0 4px #ffff00;
    }

    .tasks-list li::before {
      content: '★';
      color: #ffff00;
      flex-shrink: 0;
      text-shadow: 0 0 6px #ffff00;
      animation: starSpin 2s linear infinite;
    }

    @keyframes starSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .divider {
      border: none;
      border-top: 1px solid #330066;
    }

    /* Loading spinner */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,0,0.3);
      border-top-color: #ffff00;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: #330000;
      color: #ff6666;
      border: 2px solid #ff0000;
      padding: 12px 16px;
      font-size: 0.9rem;
      margin-top: 16px;
      box-shadow: 0 0 10px #ff0000;
      text-shadow: 0 0 4px #ff0000;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">
    <h1>~*~ VoIcE TrAnScRiBeR ~*~</h1>
    <p class="subtitle">★ ReCoRd ~ TrAnScRiBe ~ StRuCtUrE yOuR cOnVeRsAtIoNs ★</p>

    <!-- Recording Card -->
    <div class="card">
      <div class="card-title">Recording</div>

      <div class="recording-controls">
        <button id="btn-start" class="btn btn-danger">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg>
          Start Recording
        </button>
        <button id="btn-pause" class="btn btn-warning" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          Pause
        </button>
        <button id="btn-stop" class="btn btn-secondary" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
          Stop
        </button>

        <span id="status-badge" class="status-badge idle">
          <span class="dot" id="status-dot"></span>
          <span id="status-text">Idle</span>
        </span>
      </div>

      <div class="timer hidden" id="timer">0:00</div>
      <div id="record-error" class="error-msg hidden"></div>
    </div>

    <!-- Transcribe Card -->
    <div class="card hidden" id="transcribe-card">
      <div class="card-title">Transcription</div>
      <button id="btn-transcribe" class="btn btn-primary">
        Transcribe Recording
      </button>
      <div id="transcribe-error" class="error-msg hidden"></div>

      <div id="transcript-section" class="hidden" style="margin-top: 20px;">
        <textarea id="transcript-text" placeholder="Transcription will appear here..."></textarea>
        <p class="textarea-hint">You can edit the text above to correct any transcription errors.</p>
      </div>
    </div>

    <!-- Summarize Card -->
    <div class="card hidden" id="summarize-card">
      <div class="card-title">Structure & Summary</div>
      <button id="btn-summarize" class="btn btn-success">
        Structure &amp; Summarize
      </button>
      <div id="summarize-error" class="error-msg hidden"></div>

      <div id="summary-section" class="hidden" style="margin-top: 24px;">
        <div class="structured-output" id="structured-output"></div>
      </div>
    </div>
  </div>

  <script>
    let mediaRecorder = null;
    let audioChunks = [];
    let audioBlob = null;
    let timerInterval = null;
    let elapsedSeconds = 0;
    let isPaused = false;

    const btnStart = document.getElementById('btn-start');
    const btnPause = document.getElementById('btn-pause');
    const btnStop = document.getElementById('btn-stop');
    const btnTranscribe = document.getElementById('btn-transcribe');
    const btnSummarize = document.getElementById('btn-summarize');

    const statusBadge = document.getElementById('status-badge');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const timerEl = document.getElementById('timer');

    const transcribeCard = document.getElementById('transcribe-card');
    const transcriptSection = document.getElementById('transcript-section');
    const transcriptText = document.getElementById('transcript-text');
    const summarizeCard = document.getElementById('summarize-card');
    const summarySection = document.getElementById('summary-section');
    const structuredOutput = document.getElementById('structured-output');

    const recordError = document.getElementById('record-error');
    const transcribeError = document.getElementById('transcribe-error');
    const summarizeError = document.getElementById('summarize-error');

    function setStatus(state) {
      statusBadge.className = 'status-badge ' + state;
      statusDot.className = 'dot' + (state === 'recording' ? ' pulse' : '');
      const labels = { idle: 'Idle', recording: 'Recording', paused: 'Paused', done: 'Ready' };
      statusText.textContent = labels[state] || state;
    }

    function formatTime(s) {
      const m = Math.floor(s / 60);
      const sec = s % 60;
      return m + ':' + String(sec).padStart(2, '0');
    }

    function startTimer() {
      timerEl.classList.remove('hidden');
      timerInterval = setInterval(() => {
        elapsedSeconds++;
        timerEl.textContent = formatTime(elapsedSeconds);
      }, 1000);
    }

    function pauseTimer() {
      clearInterval(timerInterval);
    }

    function resetTimer() {
      clearInterval(timerInterval);
      elapsedSeconds = 0;
      timerEl.textContent = '0:00';
      timerEl.classList.add('hidden');
    }

    function showError(el, msg) {
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    function hideError(el) {
      el.classList.add('hidden');
    }

    // Start recording
    btnStart.addEventListener('click', async () => {
      hideError(recordError);
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

        const mimeType = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/mp4']
          .find(t => MediaRecorder.isTypeSupported(t)) || '';

        mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
        audioChunks = [];

        mediaRecorder.ondataavailable = e => {
          if (e.data.size > 0) audioChunks.push(e.data);
        };

        mediaRecorder.onstop = () => {
          const type = mediaRecorder.mimeType || 'audio/webm';
          audioBlob = new Blob(audioChunks, { type });
          stream.getTracks().forEach(t => t.stop());
        };

        mediaRecorder.start(250);
        isPaused = false;

        btnStart.disabled = true;
        btnPause.disabled = false;
        btnStop.disabled = false;
        transcribeCard.classList.add('hidden');
        transcriptSection.classList.add('hidden');
        summarizeCard.classList.add('hidden');
        summarySection.classList.add('hidden');

        setStatus('recording');
        resetTimer();
        startTimer();
      } catch (err) {
        showError(recordError, 'Microphone access denied. Please allow microphone access and try again.');
      }
    });

    // Pause / Resume
    btnPause.addEventListener('click', () => {
      if (!mediaRecorder) return;

      if (!isPaused) {
        mediaRecorder.pause();
        isPaused = true;
        btnPause.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg> Resume`;
        setStatus('paused');
        pauseTimer();
      } else {
        mediaRecorder.resume();
        isPaused = false;
        btnPause.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> Pause`;
        setStatus('recording');
        startTimer();
      }
    });

    // Stop recording
    btnStop.addEventListener('click', () => {
      if (!mediaRecorder) return;
      mediaRecorder.stop();

      btnStart.disabled = false;
      btnPause.disabled = true;
      btnStop.disabled = true;
      btnPause.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> Pause`;
      isPaused = false;

      setStatus('done');
      pauseTimer();
      transcribeCard.classList.remove('hidden');
    });

    // Transcribe
    btnTranscribe.addEventListener('click', async () => {
      if (!audioBlob) return;
      hideError(transcribeError);

      const mimeType = audioBlob.type || 'audio/webm';

      btnTranscribe.disabled = true;
      btnTranscribe.innerHTML = `<span class="spinner"></span> Transcribing...`;

      try {
        const base64 = await new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result.split(',')[1]);
          reader.readAsDataURL(audioBlob);
        });

        const res = await fetch('/api/transcribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ audio: base64, mimeType }),
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Transcription failed');

        transcriptText.value = data.text;
        transcriptSection.classList.remove('hidden');
        summarizeCard.classList.remove('hidden');
      } catch (err) {
        showError(transcribeError, err.message);
      } finally {
        btnTranscribe.disabled = false;
        btnTranscribe.textContent = 'Transcribe Recording';
      }
    });

    // Summarize
    btnSummarize.addEventListener('click', async () => {
      const transcript = transcriptText.value.trim();
      if (!transcript) {
        showError(summarizeError, 'The transcript is empty. Please transcribe a recording first.');
        return;
      }
      hideError(summarizeError);

      btnSummarize.disabled = true;
      btnSummarize.innerHTML = `<span class="spinner"></span> Structuring...`;

      try {
        const res = await fetch('/api/summarize', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ transcript }),
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Summarization failed');

        renderStructuredOutput(data);
        summarySection.classList.remove('hidden');
      } catch (err) {
        showError(summarizeError, err.message);
      } finally {
        btnSummarize.disabled = false;
        btnSummarize.textContent = 'Structure & Summarize';
      }
    });

    function val(v) {
      if (v === null || v === undefined || v === '') {
        return `<span class="field-value null-value">Not identified</span>`;
      }
      return `<span class="field-value">${escHtml(String(v))}</span>`;
    }

    function escHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function renderStructuredOutput(data) {
      const tasks = Array.isArray(data.followUpTasks) && data.followUpTasks.length
        ? `<ul class="tasks-list">${data.followUpTasks.map(t => `<li>${escHtml(t)}</li>`).join('')}</ul>`
        : `<span class="field-value null-value">None identified</span>`;

      structuredOutput.innerHTML = `
        <div class="field-row">
          <span class="field-label">Client Name</span>
          ${val(data.clientName)}
        </div>
        <hr class="divider" />
        <div class="field-row">
          <span class="field-label">Contact Person</span>
          ${val(data.contactPerson)}
        </div>
        <hr class="divider" />
        <div class="field-row">
          <span class="field-label">Date of Recording</span>
          ${val(data.dateOfRecording)}
        </div>
        <hr class="divider" />
        <div class="field-row">
          <span class="field-label">Summary</span>
          ${val(data.summary)}
        </div>
        <hr class="divider" />
        <div class="field-row">
          <span class="field-label">Follow-up Tasks</span>
          <div style="flex:1">${tasks}</div>
        </div>
      `;
    }
  </script>
</body>
</html>
