<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Transcriber — Synpulse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0D0F17;
      --surface:   #161922;
      --surface2:  #1E2130;
      --border:    #272B3B;
      --orange:    #F05A28;
      --orange-dk: #D44D20;
      --text:      #F0F2F8;
      --text-muted:#7B8099;
      --text-dim:  #4A4F66;
      --success:   #22C55E;
      --error:     #EF4444;
      --radius:    6px;
    }

    body {
      font-family: 'Source Sans 3', 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-mark {
      width: 28px;
      height: 28px;
      background: var(--orange);
      clip-path: polygon(0 0, 70% 0, 100% 50%, 70% 100%, 0 100%, 30% 50%);
    }

    .logo-text {
      font-family: 'Outfit', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.5px;
    }

    .logo-text span { color: var(--orange); }

    .header-tag {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* ── Page layout ── */
    .page {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    .page-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--text);
    }

    .page-subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 40px;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 32px;
      margin-bottom: 16px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .step-badge {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--orange);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-title {
      font-family: 'Outfit', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 18px;
      border: none;
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-weight: 600;
      font-family: 'Source Sans 3', sans-serif;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .btn:hover:not(:disabled) { filter: brightness(1.1); }
    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn:disabled { opacity: 0.38; cursor: not-allowed; }

    .btn-primary   { background: var(--orange); color: #fff; }
    .btn-ghost     { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover:not(:disabled) { background: var(--border); filter: none; }
    .btn-danger    { background: #7F1D1D; color: #FCA5A5; border: 1px solid #991B1B; }
    .btn-stop      { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    /* ── Status badge ── */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 5px 12px;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 600;
      border: 1px solid transparent;
    }

    .status-badge.idle       { background: var(--surface2); color: var(--text-muted); border-color: var(--border); }
    .status-badge.recording  { background: rgba(239,68,68,0.12); color: #F87171; border-color: rgba(239,68,68,0.3); }
    .status-badge.paused     { background: rgba(234,179,8,0.12); color: #FCD34D; border-color: rgba(234,179,8,0.3); }
    .status-badge.done       { background: rgba(34,197,94,0.12); color: #4ADE80; border-color: rgba(34,197,94,0.3); }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    .dot.pulse { animation: pulse 1.1s ease-in-out infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.75); }
    }

    .timer {
      font-family: 'Outfit', monospace;
      font-size: 2rem;
      font-weight: 300;
      color: var(--text);
      letter-spacing: 0.04em;
      margin-top: 20px;
    }

    /* ── Textarea ── */
    textarea {
      width: 100%;
      min-height: 160px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 0.925rem;
      line-height: 1.65;
      resize: vertical;
      color: var(--text);
      font-family: 'Source Sans 3', sans-serif;
      transition: border-color 0.15s;
    }

    textarea:focus {
      outline: none;
      border-color: var(--orange);
    }

    textarea::placeholder { color: var(--text-dim); }

    .field-hint {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* ── Structured output ── */
    .structured-output {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .field-row {
      display: flex;
      gap: 20px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }

    .field-row:last-child { border-bottom: none; }

    .field-label {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      min-width: 150px;
      padding-top: 2px;
      flex-shrink: 0;
    }

    .field-value {
      font-size: 0.925rem;
      color: var(--text);
      flex: 1;
      line-height: 1.5;
    }

    .field-value.null-value {
      color: var(--text-dim);
      font-style: italic;
    }

    .tasks-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .tasks-list li {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      font-size: 0.925rem;
      color: var(--text);
      line-height: 1.5;
    }

    .tasks-list li::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--orange);
      flex-shrink: 0;
      margin-top: 8px;
    }

    /* ── Orange accent line on cards ── */
    .card.accent { border-left: 3px solid var(--orange); }

    /* ── Download row ── */
    .download-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    /* ── Spinner ── */
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ── */
    .error-msg {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: var(--radius);
      color: #FCA5A5;
      padding: 12px 16px;
      font-size: 0.875rem;
      margin-top: 16px;
    }

    .hidden { display: none !important; }

    /* ── Divider ── */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 4px 0;
      color: var(--text-dim);
      font-size: 0.75rem;
    }

    .section-divider::before,
    .section-divider::after {
      content: '';
      flex: 1;
      border-top: 1px solid var(--border);
    }

    /* SVG icon helper */
    .icon { flex-shrink: 0; }
  </style>
</head>
<body>

  <header class="header">
    <span class="header-tag">Voice Transcriber</span>
  </header>

  <main class="page">
    <h1 class="page-title">Voice Transcriber</h1>
    <p class="page-subtitle">Record client conversations, transcribe, and extract structured summaries.</p>

    <!-- Step 1 — Record -->
    <div class="card">
      <div class="card-header">
        <div class="step-badge">1</div>
        <span class="card-title">Record</span>
      </div>

      <div class="btn-row">
        <button id="btn-start" class="btn btn-primary">
          <svg class="icon" width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg>
          Start Recording
        </button>
        <button id="btn-pause" class="btn btn-ghost" disabled>
          <svg class="icon" width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          Pause
        </button>
        <button id="btn-stop" class="btn btn-stop" disabled>
          <svg class="icon" width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
          Stop
        </button>
        <span id="status-badge" class="status-badge idle">
          <span class="dot" id="status-dot"></span>
          <span id="status-text">Idle</span>
        </span>
      </div>

      <div class="timer hidden" id="timer">0:00</div>
      <div id="record-error" class="error-msg hidden">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="record-error-text"></span>
      </div>
    </div>

    <!-- Step 2 — Transcribe -->
    <div class="card hidden" id="transcribe-card">
      <div class="card-header">
        <div class="step-badge">2</div>
        <span class="card-title">Transcription</span>
      </div>

      <button id="btn-transcribe" class="btn btn-primary">
        <svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        Transcribe Recording
      </button>

      <div id="transcribe-error" class="error-msg hidden">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="transcribe-error-text"></span>
      </div>

      <div id="transcript-section" class="hidden" style="margin-top: 20px;">
        <textarea id="transcript-text" placeholder="Transcription will appear here…"></textarea>
        <p class="field-hint">You can edit the text above to correct any transcription errors before structuring.</p>
        <div class="download-row">
          <button id="btn-download-transcript" class="btn btn-ghost">
            <svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download Transcript
          </button>
        </div>
      </div>
    </div>

    <!-- Step 3 — Structure & Summarise -->
    <div class="card hidden" id="summarize-card">
      <div class="card-header">
        <div class="step-badge">3</div>
        <span class="card-title">Structure &amp; Summary</span>
      </div>

      <button id="btn-summarize" class="btn btn-primary">
        <svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Structure &amp; Summarize
      </button>

      <div id="summarize-error" class="error-msg hidden">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="summarize-error-text"></span>
      </div>

      <div id="summary-section" class="hidden" style="margin-top: 24px;">
        <div class="structured-output" id="structured-output"></div>
        <div class="download-row">
          <button id="btn-download-csv" class="btn btn-ghost">
            <svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download Summary (CSV)
          </button>
        </div>
      </div>
    </div>
  </main>

  <script>
    let mediaRecorder = null;
    let audioChunks = [];
    let audioBlob = null;
    let timerInterval = null;
    let elapsedSeconds = 0;
    let isPaused = false;
    let lastSummaryData = null;

    const btnStart              = document.getElementById('btn-start');
    const btnPause              = document.getElementById('btn-pause');
    const btnStop               = document.getElementById('btn-stop');
    const btnTranscribe         = document.getElementById('btn-transcribe');
    const btnSummarize          = document.getElementById('btn-summarize');
    const btnDownloadTranscript = document.getElementById('btn-download-transcript');
    const btnDownloadCsv        = document.getElementById('btn-download-csv');

    const statusBadge    = document.getElementById('status-badge');
    const statusDot      = document.getElementById('status-dot');
    const statusText     = document.getElementById('status-text');
    const timerEl        = document.getElementById('timer');

    const transcribeCard     = document.getElementById('transcribe-card');
    const transcriptSection  = document.getElementById('transcript-section');
    const transcriptText     = document.getElementById('transcript-text');
    const summarizeCard      = document.getElementById('summarize-card');
    const summarySection     = document.getElementById('summary-section');
    const structuredOutput   = document.getElementById('structured-output');

    const recordErrorEl      = document.getElementById('record-error');
    const recordErrorText    = document.getElementById('record-error-text');
    const transcribeErrorEl  = document.getElementById('transcribe-error');
    const transcribeErrorText= document.getElementById('transcribe-error-text');
    const summarizeErrorEl   = document.getElementById('summarize-error');
    const summarizeErrorText = document.getElementById('summarize-error-text');

    function setStatus(state) {
      statusBadge.className = 'status-badge ' + state;
      statusDot.className = 'dot' + (state === 'recording' ? ' pulse' : '');
      const labels = { idle: 'Idle', recording: 'Recording', paused: 'Paused', done: 'Ready' };
      statusText.textContent = labels[state] || state;
    }

    function formatTime(s) {
      return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
    }

    function startTimer() {
      timerEl.classList.remove('hidden');
      timerInterval = setInterval(() => { elapsedSeconds++; timerEl.textContent = formatTime(elapsedSeconds); }, 1000);
    }

    function pauseTimer() { clearInterval(timerInterval); }

    function resetTimer() {
      clearInterval(timerInterval);
      elapsedSeconds = 0;
      timerEl.textContent = '0:00';
      timerEl.classList.add('hidden');
    }

    function showError(el, textEl, msg) { textEl.textContent = msg; el.classList.remove('hidden'); }
    function hideError(el) { el.classList.add('hidden'); }

    // ── Start recording ──
    btnStart.addEventListener('click', async () => {
      hideError(recordErrorEl);
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const mimeType = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4']
          .find(t => MediaRecorder.isTypeSupported(t)) || '';

        mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
        audioChunks = [];

        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
        mediaRecorder.onstop = () => {
          audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
          stream.getTracks().forEach(t => t.stop());
        };

        mediaRecorder.start(250);
        isPaused = false;
        btnStart.disabled = true;
        btnPause.disabled = false;
        btnStop.disabled = false;
        transcribeCard.classList.add('hidden');
        transcriptSection.classList.add('hidden');
        summarizeCard.classList.add('hidden');
        summarySection.classList.add('hidden');
        setStatus('recording');
        resetTimer();
        startTimer();
      } catch {
        showError(recordErrorEl, recordErrorText, 'Microphone access denied. Please allow microphone access and try again.');
      }
    });

    // ── Pause / Resume ──
    btnPause.addEventListener('click', () => {
      if (!mediaRecorder) return;
      if (!isPaused) {
        mediaRecorder.pause();
        isPaused = true;
        btnPause.innerHTML = `<svg class="icon" width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg> Resume`;
        setStatus('paused');
        pauseTimer();
      } else {
        mediaRecorder.resume();
        isPaused = false;
        btnPause.innerHTML = `<svg class="icon" width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> Pause`;
        setStatus('recording');
        startTimer();
      }
    });

    // ── Stop ──
    btnStop.addEventListener('click', () => {
      if (!mediaRecorder) return;
      mediaRecorder.stop();
      btnStart.disabled = false;
      btnPause.disabled = true;
      btnStop.disabled = true;
      btnPause.innerHTML = `<svg class="icon" width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> Pause`;
      isPaused = false;
      setStatus('done');
      pauseTimer();
      transcribeCard.classList.remove('hidden');
    });

    // ── Transcribe ──
    btnTranscribe.addEventListener('click', async () => {
      if (!audioBlob) return;
      hideError(transcribeErrorEl);
      const mimeType = audioBlob.type || 'audio/webm';
      btnTranscribe.disabled = true;
      btnTranscribe.innerHTML = `<span class="spinner"></span> Transcribing…`;

      try {
        const base64 = await new Promise(resolve => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result.split(',')[1]);
          reader.readAsDataURL(audioBlob);
        });

        const res = await fetch('/api/transcribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ audio: base64, mimeType }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Transcription failed');

        transcriptText.value = data.text;
        transcriptSection.classList.remove('hidden');
        summarizeCard.classList.remove('hidden');
      } catch (err) {
        showError(transcribeErrorEl, transcribeErrorText, err.message);
      } finally {
        btnTranscribe.disabled = false;
        btnTranscribe.innerHTML = `<svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg> Transcribe Recording`;
      }
    });

    // ── Summarize ──
    btnSummarize.addEventListener('click', async () => {
      const transcript = transcriptText.value.trim();
      if (!transcript) {
        showError(summarizeErrorEl, summarizeErrorText, 'The transcript is empty. Please transcribe a recording first.');
        return;
      }
      hideError(summarizeErrorEl);
      btnSummarize.disabled = true;
      btnSummarize.innerHTML = `<span class="spinner"></span> Structuring…`;

      try {
        const res = await fetch('/api/summarize', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ transcript }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Summarization failed');

        lastSummaryData = data;
        renderStructuredOutput(data);
        summarySection.classList.remove('hidden');
      } catch (err) {
        showError(summarizeErrorEl, summarizeErrorText, err.message);
      } finally {
        btnSummarize.disabled = false;
        btnSummarize.innerHTML = `<svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg> Structure &amp; Summarize`;
      }
    });

    // ── Download transcript ──
    btnDownloadTranscript.addEventListener('click', () => {
      const text = transcriptText.value;
      if (!text.trim()) return;
      triggerDownload(text, 'transcript.txt', 'text/plain');
    });

    // ── Download CSV ──
    btnDownloadCsv.addEventListener('click', () => {
      if (!lastSummaryData) return;
      const d = lastSummaryData;
      const tasks = Array.isArray(d.followUpTasks) ? d.followUpTasks.join(' | ') : '';
      const rows = [
        ['Field', 'Value'],
        ['Client Name',        d.clientName     || ''],
        ['Contact Person',     d.contactPerson  || ''],
        ['Date of Recording',  d.dateOfRecording|| ''],
        ['Summary',            d.summary        || ''],
        ['Follow-up Tasks',    tasks],
        ['Full Transcript',    transcriptText.value],
      ];
      const csv = rows.map(r => r.map(csvCell).join(',')).join('\r\n');
      triggerDownload(csv, 'synpulse-meeting-summary.csv', 'text/csv');
    });

    function csvCell(v) {
      const s = String(v).replace(/"/g, '""');
      return /[,"\r\n]/.test(s) ? `"${s}"` : s;
    }

    function triggerDownload(content, filename, type) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([content], { type }));
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    // ── Render structured output ──
    function esc(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function fieldVal(v) {
      return (v === null || v === undefined || v === '')
        ? `<span class="field-value null-value">Not identified</span>`
        : `<span class="field-value">${esc(String(v))}</span>`;
    }

    function renderStructuredOutput(data) {
      const tasks = Array.isArray(data.followUpTasks) && data.followUpTasks.length
        ? `<ul class="tasks-list">${data.followUpTasks.map(t => `<li>${esc(t)}</li>`).join('')}</ul>`
        : `<span class="field-value null-value">None identified</span>`;

      structuredOutput.innerHTML = `
        <div class="field-row">
          <span class="field-label">Client Name</span>
          ${fieldVal(data.clientName)}
        </div>
        <div class="field-row">
          <span class="field-label">Contact Person</span>
          ${fieldVal(data.contactPerson)}
        </div>
        <div class="field-row">
          <span class="field-label">Date of Recording</span>
          ${fieldVal(data.dateOfRecording)}
        </div>
        <div class="field-row">
          <span class="field-label">Summary</span>
          ${fieldVal(data.summary)}
        </div>
        <div class="field-row">
          <span class="field-label">Follow-up Tasks</span>
          <div style="flex:1">${tasks}</div>
        </div>
      `;
    }
  </script>
</body>
</html>
